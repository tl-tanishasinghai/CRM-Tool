services:
  crm-postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - crm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crm_pg_data:
