server:
  port: 8090
logging:
  level:
    root: INFO
reactor:
  netty:
    http:
      server:
        forwarded:
          strictValidation: false
spring:
  jpa:
    hibernate:
      ddl-auto: none
  config:
    import: m2p-properties.yml, bre-config.yml, digio-properties.yml, events-config.yml, analytic-properties.yml
  codec:
    max-in-memory-size: 10MB
  servlet:
    multipart:
      max-request-size: 10MB
migration:
  switch: false
# Optional: credit-line activation SMS (notification service template). BNPL agreement PDF is
# uploaded to S3 with a presigned GET URL in var4. Prefer loan-agreement bucket + KMS:
#   s3.bucket.loanAgreementStorage
#   aws.kms.loanAgreementStorage
# If either is unset, falls back to doc.upload.bucket-name (no KMS on that path).
# notification-service:
#   templates:
#     credit-line-limit-approved-template: <template-id>
web-client:
  max-idle-time: 20
  max-life-time: 30
  pending-acquire-timeout: 30
  evict-background: 15
  retry-backoff: 250
  acquire-max-count: 256
  timeout:
    extra-small: 1000
    small: 5000
    medium: 30000
    large: 30000
    extra-large: 120000
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: rdsHealth, redisHealth, readinessState
        liveness:
          include: livenessState
  web:
    exposure:
      include: health
